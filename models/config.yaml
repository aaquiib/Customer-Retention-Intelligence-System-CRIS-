# Project Configuration for Churn Segmentation Decision System
# This file documents the overall project setup and model version management

project:
  name: "Churn Segmentation Decision System"
  description: "Binary classification system for predicting customer churn"
  owner: "ML Pipeline"
  created_date: "2026-04-11"

version:
  semantic: "v1.0.0"
  timestamp: "20260411_224248"
  full_version: "v1.0.0-20260411_224248"

# ─────────────────────────────────────────
# Data Configuration
# ─────────────────────────────────────────
data:
  source:
    raw_file: "WA_Fn-UseC_-Telco-Customer-Churn.csv"
    processed_file: "data/processed/df_with_segment_labels.csv"
  
  target_variable: "Churn"
  target_type: "binary"  # 0=No Churn, 1=Churn
  
  splits:
    train_percent: 70
    validation_percent: 15
    test_percent: 15
    random_state: 42
    stratification: true
  
  features:
    total_count: 22
    numerical_count: 8
    categorical_count: 14
    
    numerical:
      - tenure
      - MonthlyCharges
      - TotalCharges
      - streaming_count
      - security_count
      - month_to_month_paperless
      - no_support_services
      - is_isolated
    
    categorical:
      - gender
      - PhoneService
      - MultipleLines
      - InternetService
      - OnlineSecurity
      - OnlineBackup
      - DeviceProtection
      - TechSupport
      - StreamingTV
      - StreamingMovies
      - Contract
      - PaperlessBilling
      - PaymentMethod
      - segment
      - tenure_band

# ─────────────────────────────────────────
# Preprocessing Configuration
# ─────────────────────────────────────────
preprocessing:
  numeric_scaler: "StandardScaler"
  categorical_encoder: "OneHotEncoder"
  encoder_params:
    drop: "first"  # Drop first category to avoid multicollinearity
    sparse_output: true
  
  imbalance_handling:
    method: "scale_pos_weight"
    lightgbm_scale_pos_weight: 1.710339753731322
    catboost_scale_pos_weight: 4.276934155166999
    xgboost_scale_pos_weight: 2.1500186861909545
    class_distribution:
      class_0_percent: 73.5
      class_1_percent: 26.5

# ─────────────────────────────────────────
# Model Configuration
# ─────────────────────────────────────────
models:
  primary:
    name: "LightGBM"
    framework: "lightgbm (v4.0.0+)"
    format: "booster (model.txt)"
    serializer: "LightGBM.Booster.save_model()"
    
    hyperparameters:
      n_estimators: 650
      max_depth: 13
      learning_rate: 0.008535633844517027
      num_leaves: 13
      min_child_samples: 21
      subsample: 0.7580026562631494
      colsample_bytree: 0.6066081804708111
      reg_alpha: 0.15703551247124883
      reg_lambda: 2.884795719882881
      scale_pos_weight: 1.710339753731322
      min_split_gain: 0.43601254903789377
      subsample_freq: 4
    
    performance:
      test_auc: 0.8406
      test_precision: 0.5600
      test_recall: 0.7000
      test_f1: 0.6222
    
    threshold:
      default: 0.5
      optimized: 0.3735
      optimization_method: "precision_recall_curve (F1-maximized)"
      optimized_precision: 0.56
      optimized_recall: 0.70
  
  secondary:
    name: "CatBoost"
    framework: "catboost (v1.2.0+)"
    format: "native (model.cbm)"
    serializer: "CatBoostClassifier.save_model()"
    
    hyperparameters:
      iterations: 400
      depth: 5
      learning_rate: 0.14343748047344063
      l2_leaf_reg: 6.719179654273406
      bagging_temperature: 1.1036568304070327
      border_count: 64
      random_strength: 2.6011875463135556
      scale_pos_weight: 4.276934155166999
      min_data_in_leaf: 22
      leaf_estimation_iterations: 2
      early_stopping_rounds: 40
    
    categorical_features: &catboost_cats
      - gender
      - PhoneService
      - MultipleLines
      - InternetService
      - OnlineSecurity
      - OnlineBackup
      - DeviceProtection
      - TechSupport
      - StreamingTV
      - StreamingMovies
      - Contract
      - PaperlessBilling
      - PaymentMethod
      - segment
      - tenure_band
    
    performance:
      test_auc: 0.8367
      test_precision: 0.4601
      test_recall: 0.8643
      test_f1: 0.6005

# ─────────────────────────────────────────
# Optimization Pipeline
# ─────────────────────────────────────────
optimization:
  framework: "Optuna 3.0+"
  sampler: "TPE (Tree-structured Parzen Estimator)"
  
  phase_1:
    name: "Broad Exploration"
    method: "RandomizedSearchCV + Manual CatBoost Search"
    xgboost:
      iterations: 60
      cv_metric: "roc_auc"
      best_cv_auc: 0.8519
    lightgbm:
      iterations: 60
      cv_metric: "roc_auc"
      best_cv_auc: 0.8504
    catboost:
      iterations: 10
      cv_metric: "roc_auc"
      best_cv_auc: 0.8522
  
  phase_2:
    name: "Focused Refinement"
    method: "Optuna (TPE Sampler)"
    xgboost:
      trials: 80
      val_metric: "roc_auc"
      best_val_auc: 0.8559
    lightgbm:
      trials: 80
      val_metric: "roc_auc"
      best_val_auc: 0.8563
      pruner: "MedianPruner (n_warmup_steps=15)"
    catboost:
      trials: 60
      val_metric: "roc_auc"
      best_val_auc: 0.8580
  
  phase_3:
    name: "Final Evaluation & Threshold Tuning"
    method: "Full retrain on train+val, evaluate on test"
    lightgbm:
      threshold_method: "precision_recall_curve"
      threshold_optimization: "F1-maximized"
      best_threshold: 0.3735
    best_model: "LightGBM"
    best_test_auc: 0.8406

# ─────────────────────────────────────────
# Deployment Configuration
# ─────────────────────────────────────────
deployment:
  inference_framework: "artifacts.py"
  classes:
    - ModelArtifactLoader
    - ChurnPredictor
  
  model_loading:
    lightgbm: "lgb.Booster(model_file='path/to/model.txt')"
    catboost: "CatBoostClassifier().load_model('path/to/model.cbm')"
  
  preprocessing:
    type: "ColumnTransformer"
    steps:
      - "StandardScaler on numerical features"
      - "OneHotEncoder on categorical features"
    output_type: "sparse matrix (scipy.sparse)"
  
  inference_latency:
    lightgbm_ms: 5  # Per sample (typical)
    catboost_ms: 15
    maximum_acceptable_ms: 100
    batch_size_recommendation: 100
  
  memory_requirements:
    lightgbm_mb: 45
    catboost_mb: 60
    preprocessor_mb: 5
    total_mb: 110

# ─────────────────────────────────────────
# Monitoring & Maintenance
# ─────────────────────────────────────────
monitoring:
  metrics_to_track:
    - prediction_distribution
    - calibration_error
    - feature_drift
    - auc_trend
  
  alert_thresholds:
    auc_drop_below: 0.80
    calibration_error_above: 0.05
    feature_ks_above: 0.15
    failed_predictions_percent: 1.0
  
  retraining_triggers:
    - "New labeled data (≥500 samples)"
    - "AUC drops below 0.80"
    - "Calibration error >5%"
    - "Feature drift detected (KS >0.15)"
    - "Quarterly refresh (recommended)"

# ─────────────────────────────────────────
# Artifact Locations
# ─────────────────────────────────────────
artifacts:
  directory: "models/v1.0.0-20260411_224248"
  
  models:
    lightgbm: "models/v1.0.0-20260411_224248/lightgbm/model.txt"
    catboost: "models/v1.0.0-20260411_224248/catboost/model.cbm"
  
  preprocessing:
    pipeline: "models/v1.0.0-20260411_224248/preprocessing/preprocessor.pkl"
    feature_metadata: "models/v1.0.0-20260411_224248/preprocessing/feature_columns.json"
    categorical_indices: "models/v1.0.0-20260411_224248/preprocessing/categorical_feature_indices.json"
    data_splits: "models/v1.0.0-20260411_224248/preprocessing/data_splits.json"
  
  thresholds:
    lightgbm: "models/v1.0.0-20260411_224248/lightgbm/threshold.pkl"
  
  configuration:
    lightgbm: "models/v1.0.0-20260411_224248/lightgbm/config.yaml"
    catboost: "models/v1.0.0-20260411_224248/catboost/config.yaml"
  
  metadata:
    full: "models/v1.0.0-20260411_224248/metadata.json"
    summary: "models/v1.0.0-20260411_224248/SAVE_SUMMARY.txt"
  
  documentation:
    model_card: "models/MODEL_CARD.md"
    readme: "models/README.md"
    config: "models/config.yaml"
  
  code:
    inference: "models/artifacts.py"
    training_notebook: "notebooks/tree_based_modelling.ipynb"

# ─────────────────────────────────────────
# Environment & Dependencies
# ─────────────────────────────────────────
environment:
  python_version: "3.10.20"
  
  dependencies:
    core:
      pandas: "2.0.0+"
      numpy: "1.24.0+"
      scikit-learn: "1.3.0+"
    
    models:
      lightgbm: "4.0.0+"
      catboost: "1.2.0+"
      xgboost: "2.0.0+"  # For reference (not deployed)
    
    optimization:
      optuna: "3.0.0+"
    
    utilities:
      pyyaml: "6.0+"
      joblib: "1.3.0+"
  
  optional:
    visualization: "matplotlib, seaborn"
    explainability: "shap"
    api_deployment: "flask, fastapi"
    containerization: "docker"

# ─────────────────────────────────────────
# Version Management
# ─────────────────────────────────────────
version_management:
  current_version: "v1.0.0-20260411_224248"
  
  previous_versions:
    # Will be populated as new versions are created

  release_strategy: "semantic_versioning_with_timestamp"
  backward_compatibility: true
  
registry:
  location: "models/registry.csv"
  fields:
    - version
    - release_date
    - primary_model
    - test_auc
    - status
    - notes

# ─────────────────────────────────────────
# License & Attribution
# ─────────────────────────────────────────
attribution:
  model_created_by: "ML Pipeline"
  training_framework: "scikit-learn, LightGBM, CatBoost, Optuna"
  preparation_date: "2026-04-11"
  repository: "churn-segmentation-decision_system"
